---
# Harbor Helm Configuration with MetalLB
expose:
  type: loadBalancer
  tls:
    enabled: false
  loadBalancer:
    name: harbor
    IP: 192.168.21.200
    ports:
      httpPort: 80
      httpsPort: 443
    annotations:
      metallb.universe.tf/allow-shared-ip: "true"
      metallb.universe.tf/ip-allocated-from-pool: "primary-pool"
  
  nodePort:
    enabled: false

externalURL: http://192.168.21.200

persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      storageClass: "harbor-local-storage"
      size: 20Gi
    chartmuseum:
      storageClass: "harbor-local-storage"
      size: 5Gi
    jobservice:
      storageClass: "harbor-local-storage"
      size: 10Gi
    database:
      storageClass: "harbor-local-storage"
      size: 20Gi
    redis:
      storageClass: "harbor-local-storage"
      size: 5Gi
    trivy:
      storageClass: "harbor-local-storage"
      size: 5Gi

harborAdminPassword: "Harbor12345"

database:
  internal:
    image:
      repository: goharbor/harbor-db
      tag: v2.10.0

redis:
  internal:
    image:
      repository: goharbor/redis-photon
      tag: v2.10.0

portal:
  image:
    repository: goharbor/harbor-portal
    tag: v2.10.0
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/address-pool: primary-pool

core:
  image:
    repository: goharbor/harbor-core
    tag: v2.10.0

jobservice:
  image:
    repository: goharbor/harbor-jobservice
    tag: v2.10.0

registry:
  registry:
    image:
      repository: goharbor/registry-photon
      tag: v2.10.0
  controller:
    image:
      repository: goharbor/harbor-registryctl
      tag: v2.10.0
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/address-pool: primary-pool

chartmuseum:
  enabled: true
  image:
    repository: goharbor/chartmuseum-photon
    tag: v2.10.0

trivy:
  enabled: true
  image:
    repository: goharbor/trivy-adapter-photon
    tag: v2.10.0

notary:
  enabled: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: false

logLevel: info