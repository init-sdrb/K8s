---
- name: Prepare Storage for Harbor CR
  hosts: workers
  become: yes
  gather_facts: no
  
  tasks:
    - name: Create Harbor directories on worker01
      file:
        path: "/data/harbor/{{ item }}"
        state: directory
        mode: '0777'
        owner: root
        group: root
      loop:
        - registry
        - chartmuseum
        - jobservice
        - database
      when: inventory_hostname == '192.168.21.121'

    - name: Create Harbor directories on worker02
      file:
        path: "/data/harbor/{{ item }}"
        state: directory
        mode: '0777'
        owner: root
        group: root
      loop:
        - redis
        - trivy
      when: inventory_hostname == '192.168.21.122'

    - name: Verify directories on worker01
      shell: |
        echo "=== Worker01 Directories ==="
        ls -la /data/harbor/ 2>/dev/null || echo "No directories found"
      when: inventory_hostname == '192.168.21.121'
      register: worker01_dirs

    - name: Verify directories on worker02
      shell: |
        echo "=== Worker02 Directories ==="
        ls -la /data/harbor/ 2>/dev/null || echo "No directories found"
      when: inventory_hostname == '192.168.21.122'
      register: worker02_dirs

    - name: Display worker01 directories
      debug:
        var: worker01_dirs.stdout_lines
      when: inventory_hostname == '192.168.21.121'

    - name: Display worker02 directories
      debug:
        var: worker02_dirs.stdout_lines
      when: inventory_hostname == '192.168.21.122'