---
- name: Setup Kubernetes Cluster on Bare Metal
  hosts: k8s_cluster
  become: yes
  tasks:

    # Step 1: Install Dependencies
    - name: Update and upgrade packages
      apt:
        update_cache: yes
        upgrade: yes

    - name: Add Docker GPG key and repository
      block:
        - name: Add Docker GPG key
          shell: |
            sudo mkdir -p /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          args:
            creates: /etc/apt/keyrings/docker.gpg

        - name: Add Docker repository
          shell: |
            echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          args:
            creates: /etc/apt/sources.list.d/docker.list

    # FIX #2: Update apt cache after adding Docker repo before installing containerd.io
    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install required dependencies
      apt:
        name:
          - vim
          - curl
          - gnupg2
          - software-properties-common
          - apt-transport-https
          - ca-certificates
          - iputils-ping
          - ufw
          - containerd.io
        state: present

    - name: Set hostnames
      hostname:
        name: "{{ 'master.deep.local' if inventory_hostname == '192.168.21.120' else 'worker01.deep.local' if inventory_hostname == '192.168.21.121' else 'worker02.deep.local' }}"

    - name: Add cluster entries to /etc/hosts
      blockinfile:
        path: /etc/hosts
        block: |
          192.168.21.120 master master.deep.local
          192.168.21.121 worker01 worker01.deep.local
          192.168.21.122 worker02 worker02.deep.local
        marker: "# {mark} Added for cluster communication between various nodes"

    - name: Set timezone to Asia/Kathmandu
      timezone:
        name: Asia/Kathmandu

    - name: Stop and disable AppArmor
      service:
        name: apparmor
        state: stopped
        enabled: no

    # FIX #4: Enable UFW with default deny policy before allowing ports
    - name: Enable UFW with default deny policy
      ufw:
        state: enabled
        policy: deny

    - name: Enable UFW and allow required ports
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto | default('tcp') }}"
      loop:
        - { port: 22 }              # SSH
        - { port: 6443 }            # Kubernetes API server
        - { port: 2379 }            # etcd client requests
        - { port: 2380 }            # etcd peer communication
        - { port: 10250 }           # Kubelet API
        - { port: 10251 }           # kube-scheduler
        - { port: 10252 }           # kube-controller-manager
        - { port: 8080 }            # Optional for HTTP
        - { port: 80 }              # HTTP
        - { port: 443 }             # HTTPS
        - { port: 179, proto: tcp } # Calico BGP (TCP)
        - { port: 179, proto: udp } # Calico BGP (UDP)
      notify: Reload UFW

    - name: Allow NodePort range 30000-32767 TCP
      shell: ufw allow 30000:32767/tcp
      notify: Reload UFW

    # Step 2: Disable Swap and Configure Networking
    - name: Disable swap
      command: swapoff -a
      changed_when: false

    - name: Remove swap entry from /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '.*swap.*'
        replace: ''

    # FIX #3: Load both overlay and br_netfilter kernel modules
    - name: Persist required kernel modules across reboots
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Load overlay kernel module
      modprobe:
        name: overlay
        state: present

    - name: Load br_netfilter kernel module
      modprobe:
        name: br_netfilter
        state: present

    - name: Enable IP forwarding and bridge-nf-call-iptables
      copy:
        dest: /etc/sysctl.d/kubernetes.conf
        content: |
          net.bridge.bridge-nf-call-ip6tables = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.ipv4.ip_forward = 1
      notify: Reload sysctl

    - name: Apply sysctl settings immediately
      command: sysctl --system
      changed_when: false

    - name: Restart containerd after sysctl changes
      systemd:
        name: containerd
        state: restarted
        enabled: yes

    # Step 3: Install Kubernetes Components
    - name: Add Kubernetes apt repository key
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    # FIX #6: Added update_cache to refresh apt after adding K8s repo
    - name: Add Kubernetes apt repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /"
        state: present
        filename: kubernetes
        update_cache: yes

    - name: Install specific versions of Kubernetes components
      apt:
        name:
          - kubelet=1.28.15-1.1
          - kubeadm=1.28.15-1.1
          - kubectl=1.28.15-1.1
        state: present

    - name: Hold Kubernetes packages at specific versions
      shell: |
        apt-mark hold kubelet kubeadm kubectl containerd.io gnupg2 software-properties-common apt-transport-https ca-certificates
      changed_when: false

  handlers:
    - name: Reload UFW
      command: ufw reload

    - name: Reload sysctl
      command: sysctl --system


# ─────────────────────────────────────────────────────────────
- name: Configure containerd on all nodes
  hosts: k8s_cluster
  become: yes   # FIX #1: Added missing become
  tasks:
    - name: Generate default containerd config
      shell: containerd config default | tee /etc/containerd/config.toml
      args:
        executable: /bin/bash
      changed_when: false

    # FIX #8: Use replace instead of lineinfile to avoid indentation mismatch
    - name: Enable SystemdCgroup in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
        backup: yes
      notify: Restart containerd service

  handlers:
    # FIX #10: Renamed handler to avoid duplicate name collision
    - name: Restart containerd service
      systemd:
        name: containerd
        state: restarted
        enabled: yes


# ─────────────────────────────────────────────────────────────
- name: Initialize Kubernetes cluster on master node
  hosts: master
  become: yes   # FIX #1: Added missing become
  tasks:
    - name: Pull Kubernetes images
      command: kubeadm config images pull
      changed_when: false

    # FIX #12: Guard kubeadm init to make it idempotent
    - name: Check if cluster is already initialized
      stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_conf

    - name: Initialize Kubernetes cluster
      command: >
        kubeadm init
        --pod-network-cidr=192.168.0.0/16
        --control-plane-endpoint=master.deep.local
        --upload-certs
      register: kubeadm_init
      # FIX #7: Removed incorrect changed_when: false
      when: not kubeadm_conf.stat.exists

    - name: Fail if kubeadm init fails
      fail:
        msg: "kubeadm init failed. Check the logs on the master node."
      when:
        - not kubeadm_conf.stat.exists
        - kubeadm_init.rc != 0

    - name: Configure kubectl for root user
      shell: |
        mkdir -p $HOME/.kube
        cp -i /etc/kubernetes/admin.conf $HOME/.kube/config
        chown $(id -u):$(id -g) $HOME/.kube/config
      changed_when: false

    # FIX #11: Use kubeadm token create --print-join-command instead of fragile regex
    - name: Generate kubeadm join command
      command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Set join command as fact
      set_fact:
        kubeadm_join_command: "{{ join_command_raw.stdout }}"


# ─────────────────────────────────────────────────────────────
- name: Join Worker Nodes to Cluster
  hosts: workers
  become: yes   # FIX #1: Added missing become
  tasks:
    # FIX #13: Guard worker join to make it idempotent
    - name: Check if node is already joined to the cluster
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Join Kubernetes cluster
      shell: "{{ hostvars[groups['master'][0]].kubeadm_join_command }}"
      when:
        - not kubelet_conf.stat.exists
        - hostvars[groups['master'][0]].kubeadm_join_command is defined


# ─────────────────────────────────────────────────────────────
- name: Install Calico Network Plugin
  hosts: master
  become: yes   # FIX #1: Added missing become
  tasks:
    # FIX #5: Updated to versioned Calico URL (v3.28 compatible with K8s 1.28)
    - name: Download and apply Calico network plugin
      shell: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/calico.yaml
      args:
        executable: /bin/bash


# ─────────────────────────────────────────────────────────────
- name: Install Kubernetes Metrics Server
  hosts: master
  become: yes   # FIX #1: Added missing become
  tasks:
    - name: Download and apply Metrics Server manifest
      shell: |
        curl -fsSL https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml -o /opt/metrics-server.yaml
        kubectl apply -f /opt/metrics-server.yaml
      args:
        executable: /bin/bash