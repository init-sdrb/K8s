---
name: Deploy Harbor Registry with MetalLB

on:
  push:
    branches: uat
    paths:
      - 'Harbor/**'
      - 'MetalLB/**'
      - 'prepare-harbor-storage.yml'
      - '.github/workflows/deploy-harbor.yml'
  workflow_dispatch:
    inputs:
      deploy_metallb:
        description: 'Deploy MetalLB'
        type: boolean
        default: true
      deploy_harbor:
        description: 'Deploy Harbor'
        type: boolean
        default: true
      harbor_action:
        description: 'Harbor action'
        type: choice
        options:
          - install
          - upgrade
          - uninstall
        default: install

env:
  KUBECONFIG_PATH: /tmp/kubeconfig-harbor
  MASTER_IP: 192.168.21.120
  METALLB_VERSION: "v0.14.5"
  HARBOR_NAMESPACE: harbor

jobs:
  pre-flight:
    name: Pre-flight Checks
    runs-on: self-hosted
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Cluster Health (Without kubectl)
        run: |
          echo "=== Checking Cluster Health via SSH ==="
          
          # Check if kubeconfig exists on master
          if ssh test@$MASTER_IP "sudo test -f /etc/kubernetes/admin.conf"; then
            echo "✅ Kubeconfig found on master"
            
            # Check if API server is responding
            ssh test@$MASTER_IP "curl -sk https://localhost:6443/healthz"
            
            # Check node status using SSH to master and running kubectl there
            echo -e "\n=== Node Status (from master) ==="
            ssh test@$MASTER_IP "sudo kubectl get nodes" 2>/dev/null || echo "⚠️  Could not get node status"
            
            # Check core pods
            echo -e "\n=== Core Pods Status ==="
            ssh test@$MASTER_IP "sudo kubectl get pods -n kube-system" 2>/dev/null || echo "⚠️  Could not get pod status"
          else
            echo "❌ ERROR: Kubernetes cluster not found on master!"
            exit 1
          fi
          
          echo -e "\n=== Testing Ansible Connectivity ==="
          ansible -i inventory.ini all -m ping

      - name: Verify Prerequisites
        run: |
          export KUBECONFIG=$KUBECONFIG_PATH
          
          echo "=== Checking Helm Installation ==="
          if ! command -v helm &> /dev/null; then
            echo "Installing Helm..."
            curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
            chmod 700 get_helm.sh
            ./get_helm.sh
            rm get_helm.sh
          fi
          helm version

  prepare-storage:
    name: Prepare Harbor Storage
    runs-on: self-hosted
    needs: pre-flight
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Ansible Storage Preparation
        run: |
          echo "=== Preparing Harbor Storage on Worker Nodes ==="
          
          # Run the Ansible playbook to create directories
          ansible-playbook -i inventory.ini prepare-harbor-storage.yml
          
          if [ $? -eq 0 ]; then
            echo "✅ Storage directories created successfully"
          else
            echo "❌ Storage preparation failed"
            exit 1
          fi

      - name: Verify Directories
        run: |
          echo "=== Verifying Directories on Worker01 ==="
          ssh test@192.168.21.121 "ls -la /data/harbor/"
          
          echo -e "\n=== Verifying Directories on Worker02 ==="
          ssh test@192.168.21.122 "ls -la /data/harbor/"

  deploy-metallb:
    name: Deploy MetalLB
    runs-on: self-hosted
    needs: pre-flight
    if: github.event.inputs.deploy_metallb != 'false'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Kubeconfig
        run: |
          ssh test@$MASTER_IP "sudo cat /etc/kubernetes/admin.conf" > $KUBECONFIG_PATH
          export KUBECONFIG=$KUBECONFIG_PATH

      - name: Create MetalLB Namespace
        run: |
          export KUBECONFIG=$KUBECONFIG_PATH
          echo "=== Creating MetalLB Namespace ==="
          kubectl apply -f MetalLB/namespace.yaml

      - name: Install MetalLB
        run: |
          export KUBECONFIG=$KUBECONFIG_PATH
          
          echo "=== Deploying MetalLB $METALLB_VERSION ==="
          kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/$METALLB_VERSION/config/manifests/metallb-native.yaml
          
          echo "=== Waiting for MetalLB controller ==="
          kubectl wait --namespace metallb-system \
            --for=condition=ready pod \
            --selector=app=metallb \
            --timeout=120s || true
          
          echo "=== MetalLB Pods ==="
          kubectl get pods -n metallb-system
          kubectl get svc -n metallb-system

      - name: Configure MetalLB IP Pools
        run: |
          export KUBECONFIG=$KUBECONFIG_PATH
          
          echo "=== Applying MetalLB Configuration ==="
          kubectl apply -f MetalLB/metallb-config.yaml
          
          echo -e "\n=== Waiting for Configuration to Apply ==="
          sleep 5
          
          echo -e "\n=== IP Pool Details ==="
          kubectl get ipaddresspools -n metallb-system
          kubectl get l2advertisements -n metallb-system
          
          echo -e "\n=== Configuration Details ==="
          kubectl describe ipaddresspool primary-pool -n metallb-system

      - name: Test MetalLB
        run: |
          export KUBECONFIG=$KUBECONFIG_PATH
          
          echo "=== Creating Test LoadBalancer ==="
          
          cat << EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx-test
            namespace: default
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: nginx-test
            template:
              metadata:
                labels:
                  app: nginx-test
              spec:
                containers:
                - name: nginx
                  image: nginx:alpine
                  ports:
                  - containerPort: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: metallb-test
            namespace: default
          spec:
            type: LoadBalancer
            ports:
              - port: 80
                targetPort: 80
            selector:
              app: nginx-test
          EOF
          
          echo "=== Waiting for LoadBalancer IP ==="
          for i in {1..30}; do
            ASSIGNED_IP=$(kubectl get svc metallb-test -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$ASSIGNED_IP" ]; then
              echo "✅ MetalLB assigned IP: $ASSIGNED_IP"
              break
            fi
            echo "Waiting for IP assignment... ($i/30)"
            sleep 5
          done
          
          if [ -z "$ASSIGNED_IP" ]; then
            echo "❌ MetalLB failed to assign IP"
            kubectl describe svc metallb-test
            exit 1
          fi
          
          echo -e "\n=== Testing Connectivity to $ASSIGNED_IP ==="
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" http://$ASSIGNED_IP || true
          
          echo -e "\n=== Cleaning up test resources ==="
          kubectl delete svc metallb-test
          kubectl delete deployment nginx-test
          
          echo "✅ MetalLB test completed successfully"

  deploy-harbor:
    name: Deploy Harbor Registry
    runs-on: self-hosted
    needs: [prepare-storage, deploy-metallb]
    if: github.event.inputs.deploy_harbor != 'false' && github.event.inputs.harbor_action != 'uninstall'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Kubeconfig
        run: |
          ssh test@$MASTER_IP "sudo cat /etc/kubernetes/admin.conf" > $KUBECONFIG_PATH
          export KUBECONFIG=$KUBECONFIG_PATH

      - name: Create Harbor Namespace and Storage
        run: |
          export KUBECONFIG=$KUBECONFIG_PATH
          
          echo "=== Creating Harbor Namespace ==="
          kubectl apply -f Harbor/namespace.yaml
          
          echo -e "\n=== Creating Storage Class and PVs ==="
          kubectl apply -f Harbor/storage-class.yaml
          
          echo -e "\n=== Verifying PVs ==="
          kubectl get pv -l app=harbor
          kubectl get storageclass

      - name: Add Harbor Helm Repository
        run: |
          echo "=== Adding Harbor Helm Repository ==="
          helm repo add harbor https://helm.goharbor.io
          helm repo update
          
          echo -e "\n=== Available Harbor Versions ==="
          helm search repo harbor/harbor --versions | head -5

      - name: Deploy Harbor with Helm
        id: harbor_deploy
        run: |
          export KUBECONFIG=$KUBECONFIG_PATH
          
          ACTION="${{ github.event.inputs.harbor_action }}"
          if [ -z "$ACTION" ]; then
            ACTION="install"
          fi
          
          if [ "$ACTION" == "upgrade" ]; then
            echo "=== Upgrading Harbor ==="
            helm upgrade harbor harbor/harbor \
              -n $HARBOR_NAMESPACE \
              -f Harbor/harbor-values.yml \
              --wait \
              --timeout 15m
          else
            echo "=== Installing Harbor ==="
            helm install harbor harbor/harbor \
              -n $HARBOR_NAMESPACE \
              -f Harbor/harbor-values.yml \
              --create-namespace \
              --wait \
              --timeout 15m
          fi
          
          echo "✅ Harbor deployment completed"

      - name: Wait for Harbor Pods
        run: |
          export KUBECONFIG=$KUBECONFIG_PATH
          
          echo "=== Waiting for Harbor Pods to be Ready ==="
          kubectl wait --for=condition=Ready pods --all -n $HARBOR_NAMESPACE --timeout=600s || true
          
          echo -e "\n=== Harbor Pods Status ==="
          kubectl get pods -n $HARBOR_NAMESPACE -o wide

      - name: Get Harbor Access Information
        run: |
          export KUBECONFIG=$KUBECONFIG_PATH
          
          echo "=== Harbor Services ==="
          kubectl get svc -n $HARBOR_NAMESPACE
          
          echo -e "\n=== Waiting for LoadBalancer IP ==="
          for i in {1..30}; do
            HARBOR_IP=$(kubectl get svc -n $HARBOR_NAMESPACE harbor-harbor-portal -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$HARBOR_IP" ]; then
              echo "✅ Harbor Portal IP: $HARBOR_IP"
              break
            fi
            echo "Waiting for IP assignment... ($i/30)"
            sleep 5
          done
          
          REGISTRY_IP=$(kubectl get svc -n $HARBOR_NAMESPACE harbor-harbor-registry -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
          
          echo ""
          echo "========================================="
          echo "       HARBOR ACCESS INFORMATION"
          echo "========================================="
          echo ""
          echo "Harbor Portal URL: http://${HARBOR_IP:-$MASTER_IP:30002}"
          echo "Registry URL: ${REGISTRY_IP:-$MASTER_IP}:5000"
          echo ""
          echo "Username: admin"
          echo "Password: Harbor12345"
          echo ""
          echo "Docker Login Command:"
          echo "  docker login ${REGISTRY_IP:-$MASTER_IP}:5000 -u admin -p Harbor12345"
          echo ""
          echo "========================================="
          
          # Save for later jobs
          echo "HARBOR_IP=${HARBOR_IP:-$MASTER_IP}" >> $GITHUB_ENV
          echo "REGISTRY_IP=${REGISTRY_IP:-$MASTER_IP}" >> $GITHUB_ENV

      - name: Test Harbor Functionality
        run: |
          export KUBECONFIG=$KUBECONFIG_PATH
          
          echo "=== Testing Harbor Registry ==="
          
          # Pull test image
          docker pull alpine:latest
          
          # Tag for Harbor
          docker tag alpine:latest ${REGISTRY_IP}:5000/library/alpine:latest
          
          # Login to Harbor
          echo "Harbor12345" | docker login ${REGISTRY_IP}:5000 -u admin --password-stdin
          
          # Push test image
          echo "Pushing test image to Harbor..."
          docker push ${REGISTRY_IP}:5000/library/alpine:latest
          
          if [ $? -eq 0 ]; then
            echo "✅ Harbor registry push successful!"
          else
            echo "⚠️  Push failed - this might be due to HTTP vs HTTPS"
            echo "Checking Harbor configuration..."
          fi
          
          echo -e "\n=== Testing Harbor API ==="
          curl -s -u admin:Harbor12345 http://${HARBOR_IP}/api/v2.0/projects | head -20

  uninstall-harbor:
    name: Uninstall Harbor
    runs-on: self-hosted
    if: github.event.inputs.harbor_action == 'uninstall'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Kubeconfig
        run: |
          ssh test@$MASTER_IP "sudo cat /etc/kubernetes/admin.conf" > $KUBECONFIG_PATH
          export KUBECONFIG=$KUBECONFIG_PATH

      - name: Uninstall Harbor
        run: |
          export KUBECONFIG=$KUBECONFIG_PATH
          
          echo "=== Uninstalling Harbor ==="
          helm uninstall harbor -n $HARBOR_NAMESPACE || true
          
          echo -e "\n=== Removing PVCs ==="
          kubectl delete pvc --all -n $HARBOR_NAMESPACE || true
          
          echo -e "\n=== Removing PVs ==="
          kubectl delete pv -l app=harbor || true
          
          echo "✅ Harbor uninstalled"

  summary:
    name: Deployment Summary
    runs-on: self-hosted
    needs: [deploy-harbor, uninstall-harbor]
    if: always()
    
    steps:
      - name: Generate Summary
        run: |
          echo "========================================="
          echo "         DEPLOYMENT SUMMARY"
          echo "========================================="
          echo ""
          echo "Workflow Status: ${{ job.status }}"
          echo "Deploy MetalLB: ${{ github.event.inputs.deploy_metallb || 'true' }}"
          echo "Deploy Harbor: ${{ github.event.inputs.deploy_harbor || 'true' }}"
          echo "Harbor Action: ${{ github.event.inputs.harbor_action || 'install' }}"
          echo ""
          echo "Workflow URL:"
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "========================================="